<div class="fade-up mb-8">
  <div class="text-[12px] uppercase mb-2" style="letter-spacing:.2em;color:var(--accent)">{{ kicker }}</div>
  <h1 class="display tracking-tight" style="line-height:1.05;font-size:clamp(34px,5vw,52px);color:var(--text)">{{ heading }}</h1>
  {% if sub %}<p class="mt-3 text-[15.5px] leading-relaxed" style="color:var(--muted);max-width:640px">{{ sub }}</p>{% endif %}
</div>
