<a href="{% url 'blog_detail' post.id %}" class="glass rounded-2xl overflow-hidden tilt" style="text-decoration:none;display:block">
  <div class="p-3 pb-0"><div class="plate" style="height:170px;background:linear-gradient(135deg,#13324d,#3a6ea5)">
    {% if post.thumb_url %}<img src="{{ post.thumb_url }}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">{% else %}<span class="motif" style="font-size:40px">📝</span>{% endif %}
  </div></div>
  <div class="p-4">
    <div class="font-semibold text-[16px]" style="color:var(--text)">{{ post.title }}</div>
    <div class="text-[13px] mt-1" style="color:var(--muted)">{{ post.excerpt }}</div>
    <div class="text-[13px] mt-2" style="color:var(--accent)">Read more →</div>
  </div>
</a>
