<a href="{% url 'product_detail' p.id %}" class="glass rounded-2xl overflow-hidden tilt fade-up" style="text-decoration:none;display:block">
  <div class="p-3 pb-0">
    <div class="plate" style="height:170px;background:{{ p.gradient }}">
      {% if p.image %}<img src="{{ p.image.url }}" alt="{{ p.name }}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">{% else %}<span class="motif" style="font-size:54px">{{ p.motif }}</span>{% endif %}
    </div>
  </div>
  <div class="p-4">
    <div class="flex items-center justify-between mb-1">
      <span class="text-[10.5px] uppercase px-2 py-0.5 rounded-full" style="color:var(--accent);border:1px solid var(--border)">{{ p.type_label }}</span>
      <span class="text-[10px]" style="color:var(--muted)">{{ p.category_name }}</span>
    </div>
    <div class="font-semibold text-[16px]" style="color:var(--text)">{{ p.name }}</div>
    <div class="mt-1 text-[14px]" style="color:var(--accent)">{% if p.price == 0 %}From custom quote{% else %}Rs {{ p.price }}{% endif %}</div>
  </div>
</a>
