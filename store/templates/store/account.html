{% extends "store/base.html" %}
{% block content %}
<section class="max-w-md mx-auto px-5 py-16" style="position:relative;z-index:2">
  <div class="glass rounded-3xl p-8 text-center">
    <div class="mx-auto mb-5">{% include "store/partials/logo.html" with h=46 %}</div>
    <h1 class="display mb-2" style="font-size:26px;color:var(--text)">My account</h1>
    <p class="text-[14px] mb-7" style="color:var(--muted)">Sign in to track your orders and saved designs.</p>
    <button onclick="alert('Google sign-in will be configured soon.')" class="w-full rounded-full flex items-center justify-center gap-3 px-5 py-3.5 font-semibold" style="background:#fff;color:#1f1f1f;border:1px solid var(--border)">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p class="text-[12px] mt-4" style="color:var(--muted)">Authentication isn’t connected yet — this is a placeholder.</p>
  </div>
</section>
{% endblock %}
{% block whatsapp %}{% endblock %}
